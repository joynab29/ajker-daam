services:
  mongodb:
    image: mongo:7
    container_name: ajker-daam-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  server:
    build: ./server
    container_name: ajker-daam-server
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGO_URI: mongodb://mongodb:27017/ajker_daam
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:5173}
    volumes:
      - ./server/uploads:/app/uploads

  client:
    build: ./client
    container_name: ajker-daam-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

volumes:
  mongodb_data:
